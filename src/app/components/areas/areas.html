<p-confirmDialog>
  <ng-template pTemplate="message" let-message>
    <div class="flex flex-column align-items-center text-center gap-3">
      <i [class]="message.icon" class="dialog-icon"></i>
      <p class="dialog-message">{{ message.message }}</p>
    </div>
  </ng-template>
</p-confirmDialog>

<div class="header-container">
  <div class="form-header-container">
    <div class="form-header page-header">
      <div class="header-left">
        <button
          pButton
          icon="pi pi-arrow-left back"
          class="p-button-text back-button"
          (click)="regresar()"
          pTooltip="Regresar al Panel"
          tooltipPosition="bottom"
        ></button>
        <h2><i class="pi pi-tags user-icon"></i> Gestión de Áreas</h2>
      </div>

      <div class="header-right">
        <p-button
          label="Agregar Área"
          icon="pi pi-plus"
          styleClass="p-button-wine"
          (click)="abrirModalAgregar()"
        >
        </p-button>
      </div>
    </div>
  </div>
</div>

<div class="admin-page-container">
  <p-table
    #dtAreas
    [value]="areas"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    [globalFilterFields]="['nombre']"
    styleClass="p-datatable-striped p-datatable-gridlines custom-table"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} áreas"
    [showCurrentPageReport]="true"
  >
    <ng-template pTemplate="caption">
      <div class="table-header">
        <span>Lista de Áreas</span>
        <div class="filter-container">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input
              pInputText
              type="text"
              [(ngModel)]="globalFilter"
              (input)="applyFilterGlobal(dtAreas, $event)"
              placeholder="Buscar..."
              class="table-search-input"
            />
          </span>
          <p-button
            icon="pi pi-filter-slash"
            styleClass="p-button-outlined clear-filter-button"
            (click)="clearFilter(dtAreas)"
            pTooltip="Limpiar filtro"
          >
          </p-button>
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="nombre">
          Nombre del Área <p-sortIcon field="nombre"></p-sortIcon>
        </th>
        <th style="width: 10rem; text-align: center;">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-area>
      <tr>
        <td>{{ area.nombre }}</td>
        <td style="text-align: center;">
          <div class="table-actions">
            <button
              pButton
              icon="pi pi-pencil"
              class="action-btn-compact edit-btn"
              pTooltip="Editar"
              (click)="abrirModalEditar(area)"
            ></button>
            <button
              pButton
              icon="pi pi-trash"
              class="action-btn-compact delete-btn"
              pTooltip="Eliminar"
              (click)="eliminar(area)"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="2" class="text-center empty-message">No se encontraron áreas.</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="loadingbody">
      <tr>
        <td colspan="2" class="text-center loading-message">Cargando Áreas...</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [header]="isEditMode ? 'Editar Área' : 'Agregar Nueva Área'"
  [(visible)]="displayModal"
  [modal]="true"
  [style]="{ width: '500px' }"
  [draggable]="false"
  [dismissableMask]="false"
  [focusOnShow]="false"
>
  <form [formGroup]="areasForm" (ngSubmit)="onSubmit()" class="form-container">
    <div class="field">
      <label for="nombre">
        <i class="pi pi-tag"></i> <span>Nombre del Área<span class="text red">*</span></span>
      </label>
      <input
        id="nombre"
        pInputText
        formControlName="nombre"
        placeholder="Ej: Teología, Filosofía"
        class="form-comp w-full"
        maxlength="75"
      />
      <div
        class="error-msg text red text-sm flex flex-column"
        [@dropIn]
        *ngIf="(areasForm.get('nombre')?.dirty || isSubmitting) && areasForm.get('nombre')?.invalid"
      >
        <small *ngIf="areasForm.get('nombre')?.errors?.['required']"
          >El nombre es obligatorio.</small
        >
        <small *ngIf="areasForm.get('nombre')?.errors?.['minlength']"
          >El nombre debe tener al menos 4 caracteres.</small
        >
      </div>
    </div>
    <div class="form-footer mt-4" style="display: flex; justify-content: flex-end; gap: 1rem;">
      <button type="button" pButton class="p-button-text" style="color: var(--wine);" (click)="cerrarModal()">Cancelar</button>
      <button
        type="submit"
        pButton
        icon="pi pi-check"
        style="background-color: var(--wine); border-color: var(--wine);"
        [loading]="isSubmitting"
        [disabled]="areasForm.invalid"
      >
        Guardar
      </button>
    </div>
  </form>
</p-dialog>
