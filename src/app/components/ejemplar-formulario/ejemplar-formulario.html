<form [formGroup]="ejemplarForm" (ngSubmit)="onSubmit()" class="form-container">
  <div class="field" *ngIf="mostrarSelectorLibro">
    <label for="libro">
      <i class="pi pi-book"></i> Libro
      <label class="text red">*</label>
    </label>
    <p-select
      id="libro"
      formControlName="idLibro"
      [options]="libros"
      optionLabel="titulo"
      optionValue="id"
      placeholder="Selecciona un libro"
      [filter]="true"
      filterBy="titulo"
      [showClear]="true"
      class="form-comp"
    ></p-select>
    <div
      class="error-msg text red text-sm flex flex-column"
      [@dropIn]
      *ngIf="
        (ejemplarForm.get('idLibro')?.dirty || isSubmitting) && ejemplarForm.get('idLibro')?.invalid
      "
    >
      <small *ngIf="ejemplarForm.get('idLibro')?.errors?.['required']"
        >Especificar un libro es obligatorio.</small
      >
    </div>
  </div>

  <div class="field">
    <label for="ubicacion"> <i class="pi pi-map-marker"></i> Ubicación </label>
    <input
      id="ubicacion"
      pInputText
      class="form-comp"
      formControlName="ubicacion"
      placeholder="Ej: Estante A-3, Nivel 2"
    />
    <div
      class="error-msg text red text-sm flex flex-column"
      [@dropIn]
      *ngIf="
        (ejemplarForm.get('ubicacion')?.dirty || isSubmitting) &&
        ejemplarForm.get('ubicacion')?.invalid
      "
    >
      <small *ngIf="ejemplarForm.get('ubicacion')?.errors?.['minlength']"
        >La ubicación debe tener al menos 2 caracteres.</small
      >
    </div>
  </div>

  <div class="field">
    <label for="condicion">
      <i class="pi pi-check-circle"></i> Condición Física
      <label class="text red">*</label>
    </label>
    <div class="p-inputgroup">
      <p-select
        id="estado"
        [showClear]="true"
        [options]="condiciones"
        formControlName="idCondicionFisicaEjemplar"
        optionLabel="nombre"
        optionValue="id"
        placeholder="Selecciona un estado"
        class="form-comp"
      ></p-select>
      <button
        type="button"
        pButton
        icon="pi pi-plus"
        class="btn-primary"
        (click)="abrirModalAgregar('condicion')"
        pTooltip="Agregar nueva condicion"
        tooltipPosition="top"
      ></button>
    </div>
    <div
      class="error-msg text red text-sm flex flex-column"
      [@dropIn]
      *ngIf="
        (ejemplarForm.get('idCondicionFisicaEjemplar')?.dirty || isSubmitting) &&
        ejemplarForm.get('idCondicionFisicaEjemplar')?.invalid
      "
    >
      <small *ngIf="ejemplarForm.get('idCondicionFisicaEjemplar')?.errors?.['required']"
        >Especificar la condición del ejemplar es obligatorio.</small
      >
    </div>
  </div>

  <div class="field">
    <label for="estado">
      <i class="pi pi-info-circle"></i> Estado Inicial
      <label class="text red">*</label>
    </label>
    <div class="p-inputgroup">
      <p-select
        id="estado"
        [showClear]="true"
        [options]="estados"
        formControlName="idEstadoEjemplar"
        optionLabel="nombre"
        optionValue="id"
        placeholder="Selecciona un estado"
        class="form-comp"
      ></p-select>
      <button
        type="button"
        pButton
        icon="pi pi-plus"
        class="btn-primary"
        (click)="abrirModalAgregar('estado')"
        pTooltip="Agregar nuevo estado"
        tooltipPosition="top"
      ></button>
    </div>
    <div
      class="error-msg text red text-sm flex flex-column"
      [@dropIn]
      *ngIf="
        (ejemplarForm.get('idEstadoEjemplar')?.dirty || isSubmitting) &&
        ejemplarForm.get('idEstadoEjemplar')?.invalid
      "
    >
      <small *ngIf="ejemplarForm.get('idEstadoEjemplar')?.errors?.['required']"
        >Especificar el estado del ejemplar es obligatorio.</small
      >
    </div>
  </div>

  <div class="form-footer">
    <button
      type="button"
      pButton
      class="btn-info text"
      (click)="cancelar()"
      [disabled]="isSubmitting"
    >
      Cancelar
    </button>
    <button
      type="submit"
      pButton
      icon="pi pi-check"
      class="btn-primary"
      [loading]="isSubmitting"
      [disabled]="ejemplarForm.invalid || isSubmitting"
    >
      {{ isEditMode ? 'Actualizar' : 'Guardar' }}
    </button>
  </div>
</form>

<p-dialog
  [header]="
    catalogoSiendoAgregado === 'condicion' ? 'Agregar Nueva Condición' : 'Agregar Nuevo Estado'
  "
  [(visible)]="displayCatalogoDialog"
  [draggable]="false"
  [modal]="true"
  [style]="{ width: '500px' }"
  [dismissableMask]="false"
  [focusOnShow]="false"
>
  <form [formGroup]="catalogoForm" (ngSubmit)="guardarNuevoCatalogo()" class="form-container">
    <div class="field">
      <label for="nuevoNombre">
        Nombre
        <label class="text red">*</label>
      </label>
      <input
        id="nuevoNombre"
        pInputText
        maxlength="50"
        formControlName="nombre"
        placeholder="Ingrese el nombre"
        class="form-comp"
      />
      <div
        class="special-error-msg text red text-sm flex flex-column mt-1"
        [class.visible]="
          (catalogoForm.get('nombre')?.dirty || isSubmitting) && catalogoForm.get('nombre')?.invalid
        "
      >
        <small *ngIf="catalogoForm.get('nombre')?.errors?.['required']"
          >El nombre es obligatorio.</small
        >
        <small *ngIf="catalogoForm.get('nombre')?.errors?.['minlength']"
          >El nombre debe tener al menos 2 caracteres.</small
        >
      </div>
    </div>

    <div class="form-footer">
      <button type="button" pButton class="btn-info text" (click)="displayCatalogoDialog = false">
        Cancelar
      </button>
      <button
        type="submit"
        pButton
        icon="pi pi-check"
        class="btn-primary"
        [loading]="isSubmitting"
        [disabled]="catalogoForm.invalid"
      >
        Guardar
      </button>
    </div>
  </form>
</p-dialog>
