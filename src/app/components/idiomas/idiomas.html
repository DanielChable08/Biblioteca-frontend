<p-confirmDialog>
  <ng-template pTemplate="message" let-message>
    <div class="flex flex-column align-items-center text-center gap-3">
      <i [class]="message.icon" class="dialog-icon"></i>
      <p class="dialog-message">{{ message.message }}</p>
    </div>
  </ng-template>
</p-confirmDialog>

<div class="header-container">
  <div class="form-header-container">
    <div class="form-header page-header">
      <div class="header-left">
        <button
          pButton
          icon="pi pi-arrow-left back"
          class="p-button-text back-button"
          (click)="regresar()"
          pTooltip="Regresar al Panel"
          tooltipPosition="bottom">
        </button>
        <h2><i class="pi pi-globe user-icon"></i> Gestión de Idiomas</h2>
      </div>

      <div class="header-right">
        <p-button
          label="Agregar Idioma"
          icon="pi pi-plus"
          styleClass="p-button-wine"
          (click)="abrirModalAgregar()">
        </p-button>
      </div>
    </div>
  </div>
</div>

<div class="admin-page-container">
  <p-table 
    #dtIdiomas 
    [value]="idiomas" 
    [loading]="loading" 
    [paginator]="true" 
    [rows]="10" 
    [rowsPerPageOptions]="[10, 25, 50]"
    [globalFilterFields]="['nombre']" 
    styleClass="p-datatable-striped p-datatable-gridlines custom-table"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} idiomas" 
    [showCurrentPageReport]="true">

    <ng-template pTemplate="caption">
      <div class="table-header">
        <span>Lista de Idiomas</span>
        <div class="filter-container">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input 
              pInputText 
              type="text" 
              [(ngModel)]="globalFilter" 
              (input)="applyFilterGlobal(dtIdiomas, $event)" 
              placeholder="Buscar..." 
              class="table-search-input" />
          </span>
          <p-button 
            icon="pi pi-filter-slash" 
            styleClass="p-button-outlined clear-filter-button" 
            (click)="clearFilter(dtIdiomas)" 
            pTooltip="Limpiar filtro">
          </p-button>
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="nombre">Nombre del Idioma <p-sortIcon field="nombre"></p-sortIcon></th>
        <th style="width: 10rem;">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-idioma>
      <tr>
        <td>{{ idioma.nombre }}</td>
        <td>
          <div class="table-actions">
            <button 
              pButton 
              icon="pi pi-pencil" 
              class="action-btn-compact edit-btn" 
              pTooltip="Editar" 
              (click)="abrirModalEditar(idioma)">
            </button>
            <button 
              pButton 
              icon="pi pi-trash" 
              class="action-btn-compact delete-btn" 
              pTooltip="Eliminar" 
              (click)="eliminar(idioma)">
            </button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="2" class="text-center empty-message">No se encontraron idiomas.</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="loadingbody">
      <tr>
        <td colspan="2" class="text-center loading-message">Cargando idiomas...</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [header]="isEditMode ? 'Editar Idioma' : 'Agregar Nuevo Idioma'"
  [(visible)]="displayModal"
  [modal]="true"
  [style]="{ width: '500px' }"
  [draggable]="false"
  [dismissableMask]="false"
  [focusOnShow]="false">
  <form [formGroup]="idiomaForm" (ngSubmit)="onSubmit()" class="form-container">
    <div class="field">
      <label for="nombre">
        <i class="pi pi-globe"></i> Nombre del Idioma <span class="text red">*</span>
      </label>
      <input 
        id="nombre" 
        pInputText 
        maxlength="30"
        class="form-comp"
        formControlName="nombre" 
        placeholder="Ej: Español, Inglés, Portugués" 
      />
      <div
        class="error-msg text red text-sm flex flex-column"
        [@dropIn]
        *ngIf="(idiomaForm.get('nombre')?.dirty || isSubmitting) && idiomaForm.get('nombre')?.invalid"
      >
        <small *ngIf="idiomaForm.get('nombre')?.errors?.['required']"
          >El nombre es obligatorio.</small
        >
        <small *ngIf="idiomaForm.get('nombre')?.errors?.['minlength']"
          >El nombre debe tener al menos 2 caracteres.</small
        >
      </div>
    </div>

    <div class="form-footer">
      <button type="button" pButton class="btn-info text" (click)="cerrarModal()">
        Cancelar
      </button>
      <button 
        type="submit" 
        pButton 
        icon="pi pi-check" 
        class="btn-primary" 
        [loading]="isSubmitting" 
        [disabled]="idiomaForm.invalid">
        Guardar
      </button>
    </div>
  </form>
</p-dialog>
